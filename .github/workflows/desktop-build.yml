name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac
            os: macos-latest
            script: dist:mac
          - target: linux
            os: ubuntu-latest
            script: dist:linux
          - target: windows
            os: windows-latest
            script: dist:win

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - run: npm run check

      - run: npm run ${{ matrix.script }} -- --publish never

      - uses: actions/upload-artifact@v7
        with:
          name: llm-usage-dashboard-${{ matrix.target }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "$GITHUB_REF_NAME unsigned preview"
            gh release upload "$GITHUB_REF_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME unsigned preview" \
              --prerelease \
              --generate-notes
          fi
