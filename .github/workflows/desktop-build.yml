name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac
            os: macos-latest
            script: dist:mac
          - target: linux
            os: ubuntu-latest
            script: dist:linux
          - target: windows
            os: windows-latest
            script: dist:win

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - run: npm run check

      - run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: llm-usage-dashboard-${{ matrix.target }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error
