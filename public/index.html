<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="app.title">LLM Usage</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="app.eyebrow">LLM Usage</p>
          <h1 data-i18n="app.heading">Limits & Tokens</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="refreshBtn" aria-label="Aktualisieren" title="Aktualisieren" data-i18n-aria-label="actions.refresh" data-i18n-title="actions.refresh">
            <i data-lucide="refresh-cw"></i>
          </button>
          <button class="icon-button" id="settingsBtn" aria-label="Einstellungen" title="Einstellungen" data-i18n-aria-label="actions.settings" data-i18n-title="actions.settings">
            <i data-lucide="sliders-horizontal"></i>
          </button>
          <button class="text-button ghost filter-button" id="providerFilterBtn" type="button" aria-pressed="false" data-i18n="filter.showAll">
            Alle anzeigen
          </button>
          <button class="text-button" id="loginBtn" data-i18n="auth.login">Login</button>
          <button class="text-button ghost" id="logoutBtn" hidden data-i18n="auth.logout">Logout</button>
        </div>
      </header>

      <section class="summary-strip" aria-label="Übersicht" data-i18n-aria-label="summary.ariaLabel">
        <div class="metric-tile">
          <span data-i18n="summary.fiveHourOpen">5h frei</span>
          <strong id="fiveHourOpen">--</strong>
        </div>
        <div class="metric-tile">
          <span data-i18n="summary.weeklyOpen">Woche frei</span>
          <strong id="weeklyOpen">--</strong>
        </div>
        <div class="metric-tile">
          <span data-i18n="summary.tokensToday">Geloggte Tokens heute</span>
          <strong id="tokensToday">--</strong>
        </div>
        <div class="metric-tile">
          <span data-i18n="summary.tokensTotal">Geloggte Tokens gesamt</span>
          <strong id="tokensTotal">--</strong>
          <span class="metric-note" id="recordDay" hidden></span>
        </div>
      </section>

      <section class="provider-grid" id="providerGrid" aria-label="Anbieter" data-i18n-aria-label="providers.gridAria"></section>

      <section class="usage-layout">
        <div class="panel chart-panel">
          <div class="panel-heading chart-heading">
            <div>
              <p class="eyebrow" data-i18n="chart.eyebrow">Lokale Logs</p>
              <h2 data-i18n="chart.heading">Token-Verlauf aus Logs</h2>
            </div>
            <div id="sourceTotals" class="source-bars" aria-label="Gesamtverbrauch nach Anbieter" data-i18n-aria-label="chart.sourceTotalsAria"></div>
          </div>
          <div id="chart" class="chart"></div>
          <div id="chartLegend" class="chart-legend" aria-label="Legende" data-i18n-aria-label="chart.legendAria"></div>
        </div>

        <div class="panel split-panel">
          <div>
            <p class="eyebrow" data-i18n="tokenMix.eyebrow">Token Mix</p>
            <h2 data-i18n="tokenMix.heading">Geloggte Token-Verarbeitung</h2>
          </div>
          <dl class="token-list" id="tokenList"></dl>
        </div>
      </section>

      <section class="panel price-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow" data-i18n="pricing.eyebrow">API-Kosten</p>
            <h2 data-i18n="pricing.heading">Was deine Tokens über die API gekostet hätten</h2>
          </div>
          <span id="pricingMeta" class="soft-label">--</span>
        </div>
        <div class="price-table-wrap">
          <table class="price-table">
            <thead>
              <tr>
                <th><button class="sort-button" type="button" data-price-sort="model" data-i18n="pricing.columns.model">Modell</button></th>
                <th><button class="sort-button" type="button" data-price-sort="score" data-i18n="pricing.columns.score">Score</button></th>
                <th><button class="sort-button" type="button" data-price-sort="region" data-i18n="pricing.columns.region">Region</button></th>
                <th><button class="sort-button" type="button" data-price-sort="input" data-i18n="pricing.columns.input">Input</button></th>
                <th><button class="sort-button" type="button" data-price-sort="cache" data-i18n="pricing.columns.cache">Cache</button></th>
                <th><button class="sort-button" type="button" data-price-sort="output" data-i18n="pricing.columns.output">Output</button></th>
                <th><button class="sort-button" type="button" data-price-sort="today" data-i18n="pricing.columns.today">Heute</button></th>
                <th><button class="sort-button" type="button" data-price-sort="total" data-i18n="pricing.columns.total">Gesamt</button></th>
                <th><button class="sort-button" type="button" data-price-sort="source" data-i18n="pricing.columns.source">Quelle</button></th>
              </tr>
            </thead>
            <tbody id="priceRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="loginDialog" class="modal">
      <form method="dialog" class="modal-body" id="loginForm">
        <div class="modal-heading">
          <h2 data-i18n="auth.login">Login</h2>
          <button class="icon-button" value="cancel" aria-label="Schließen" title="Schließen" data-i18n-aria-label="actions.close" data-i18n-title="actions.close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <label class="field">
          <span data-i18n="auth.password">Passwort</span>
          <input type="password" id="passwordInput" autocomplete="current-password" />
        </label>
        <div class="modal-actions">
          <a class="text-button ghost" href="/auth/oidc/start" id="oidcLink">SSO</a>
          <button class="text-button" type="submit" data-i18n="auth.signIn">Einloggen</button>
        </div>
        <p class="form-error" id="loginError"></p>
      </form>
    </dialog>

    <dialog id="settingsDialog" class="modal">
      <div class="modal-body">
        <div class="modal-heading">
          <h2 data-i18n="settings.heading">Einstellungen</h2>
          <button class="icon-button" type="button" id="settingsCloseBtn" aria-label="Schließen" title="Schließen" data-i18n-aria-label="actions.close" data-i18n-title="actions.close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="settings-preferences">
          <label class="field language-field">
            <span data-i18n="settings.language.label">Sprache</span>
            <select id="languageSelect" aria-label="Sprache" data-i18n-aria-label="settings.language.label"></select>
          </label>
        </div>
      </div>
    </dialog>
  </body>
</html>
